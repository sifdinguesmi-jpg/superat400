    <style>

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 15px; padding: 15px; text-align: center; transition: transform 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: 1px solid #eee; }

        .card img { width: 100%; height: 160px; object-fit: contain; border-radius: 10px; margin-bottom: 10px; background: #fff; }
        .price { color: var(--primary-color); font-weight: bold; font-size: 1.2rem; display: block; margin-bottom: 15px; }

        .whatsapp-btn:hover { background-color: #128C7E; transform: scale(1.05); }
        footer { text-align: center; padding: 20px; color: #7f8c8d; border-top: 1px solid #ddd; margin-top: 50px; }
    </style>
